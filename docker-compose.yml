version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    network_mode: host
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    env_file: ./backend/.env
    cap_add:
      - NET_ADMIN

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
    network_mode: host
    command: python manage.py run_scheduler
    env_file: ./backend/.env
    depends_on:
      - backend